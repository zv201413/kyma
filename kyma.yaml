apiVersion: v1
kind: Namespace
metadata:
  name: uncleluo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: uncleluo-vless-sa-v163
  namespace: uncleluo
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: uncleluo-vless-role-v163
  namespace: uncleluo
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: uncleluo-vless-rb-v163
  namespace: uncleluo
subjects:
  - kind: ServiceAccount
    name: uncleluo-vless-sa-v163
    namespace: uncleluo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: uncleluo-vless-role-v163
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: uncleluo-web-files-v163
  namespace: uncleluo
data:
  index.html: |
    <!doctype html>
    <html lang="zh-CN">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width,initial-scale=1" />
      <title>Uncle LUO Automation Platform</title>
      <style>
        :root{
          --bg: #0b1220;
          --panel: rgba(15, 23, 42, 0.88);
          --panel-2: rgba(30, 41, 59, 0.78);
          --line: rgba(148, 163, 184, 0.18);
          --text: #e5eefc;
          --muted: #94a3b8;
          --accent: #3b82f6;
          --accent-2: #2563eb;
          --success: #22c55e;
          --shadow: 0 16px 40px rgba(0,0,0,.35);
          --radius-xl: 24px;
          --radius-lg: 18px;
          --radius-md: 14px;
        }

        * { box-sizing: border-box; }

        body{
          margin:0;
          font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
          color: var(--text);
          background:
            radial-gradient(circle at top left, rgba(59,130,246,.18), transparent 32%),
            radial-gradient(circle at top right, rgba(37,99,235,.14), transparent 28%),
            linear-gradient(180deg, #08101d 0%, #0b1220 100%);
          min-height: 100vh;
        }

        .wrap{
          max-width: 1180px;
          margin: 0 auto;
          padding: 28px 20px 40px;
        }

        .topbar{
          display:flex;
          align-items:center;
          justify-content:space-between;
          gap:16px;
          margin-bottom: 18px;
        }

        .brand{
          display:flex;
          align-items:center;
          gap:14px;
          min-width:0;
        }

        .brand-icon{
          width:46px;
          height:46px;
          border-radius:16px;
          display:grid;
          place-items:center;
          background: linear-gradient(135deg, rgba(59,130,246,.25), rgba(37,99,235,.45));
          border: 1px solid rgba(96,165,250,.24);
          box-shadow: var(--shadow);
          font-size: 24px;
          flex: 0 0 auto;
        }

        .brand-text{
          min-width:0;
        }

        .title{
          margin:0;
          font-size: clamp(22px, 3vw, 34px);
          font-weight: 800;
          line-height:1.12;
          letter-spacing: -.02em;
        }

        .subtitle{
          margin: 6px 0 0;
          color: var(--muted);
          font-size: 14px;
          line-height: 1.6;
        }

        .top-actions{
          display:flex;
          align-items:center;
          gap:10px;
          flex-wrap:wrap;
          justify-content:flex-end;
        }

        .pill{
          display:inline-flex;
          align-items:center;
          gap:8px;
          padding: 10px 14px;
          border-radius: 999px;
          border: 1px solid var(--line);
          background: rgba(15,23,42,.72);
          color: var(--text);
          font-size: 13px;
          text-decoration:none;
          white-space: nowrap;
          transition: .2s ease;
        }

        .pill:hover{
          transform: translateY(-1px);
          border-color: rgba(59,130,246,.4);
          background: rgba(20,30,50,.9);
        }

        .pill.youtube{
          background: linear-gradient(135deg, rgba(239,68,68,.18), rgba(220,38,38,.22));
          border-color: rgba(248,113,113,.28);
        }

        .hero{
          border: 1px solid var(--line);
          background: linear-gradient(180deg, rgba(15,23,42,.88), rgba(15,23,42,.72));
          box-shadow: var(--shadow);
          border-radius: var(--radius-xl);
          overflow: hidden;
        }

        .hero-top{
          display:flex;
          align-items:center;
          justify-content:space-between;
          gap:16px;
          padding: 18px 20px;
          border-bottom: 1px solid var(--line);
          background: rgba(255,255,255,.02);
        }

        .hero-badge{
          display:inline-flex;
          align-items:center;
          gap:8px;
          padding: 8px 12px;
          border-radius: 999px;
          background: rgba(59,130,246,.12);
          border: 1px solid rgba(59,130,246,.22);
          color: #dbeafe;
          font-size: 12px;
          font-weight: 700;
          letter-spacing: .02em;
        }

        .hero-status{
          color: var(--muted);
          font-size: 13px;
          text-align:right;
        }

        .hero-main{
          display:grid;
          grid-template-columns: 360px 1fr;
          gap: 24px;
          padding: 24px;
        }

        .qr-card,
        .info-card{
          border: 1px solid var(--line);
          border-radius: var(--radius-lg);
          background: linear-gradient(180deg, rgba(15,23,42,.88), rgba(30,41,59,.42));
          box-shadow: inset 0 1px 0 rgba(255,255,255,.02);
        }

        .qr-card{
          padding: 20px;
          display:flex;
          flex-direction:column;
          align-items:center;
          justify-content:center;
          gap: 14px;
          min-height: 440px;
        }

        .qr-label{
          color: var(--muted);
          font-size: 13px;
          letter-spacing: .02em;
          text-transform: uppercase;
        }

        .qr-box{
          width: 292px;
          height: 292px;
          background: #fff;
          border-radius: 24px;
          padding: 14px;
          display:grid;
          place-items:center;
          box-shadow: 0 18px 36px rgba(0,0,0,.2);
        }

        .qr-box img{
          width: 100%;
          height: 100%;
          display:block;
          border-radius: 14px;
          image-rendering: pixelated;
        }

        .qr-placeholder{
          color:#0f172a;
          font-size:14px;
          text-align:center;
          line-height:1.6;
          padding: 12px;
        }

        .copy-btn{
          width: 100%;
          max-width: 292px;
          border: none;
          border-radius: 14px;
          padding: 14px 16px;
          cursor: pointer;
          font-size: 15px;
          font-weight: 700;
          color: white;
          background: linear-gradient(135deg, var(--accent), var(--accent-2));
          box-shadow: 0 10px 24px rgba(37,99,235,.28);
          transition: .2s ease;
        }

        .copy-btn:hover{ transform: translateY(-1px); }
        .copy-btn:active{ transform: translateY(0); }

        .info-card{
          padding: 22px;
          display:flex;
          flex-direction:column;
          gap: 18px;
          min-height: 440px;
        }

        .section-head{
          display:flex;
          align-items:center;
          justify-content:space-between;
          gap:16px;
          flex-wrap:wrap;
        }

        .section-title{
          margin:0;
          font-size: 18px;
          font-weight: 800;
          letter-spacing: -.01em;
        }

        .section-desc{
          margin: 6px 0 0;
          color: var(--muted);
          font-size: 13px;
          line-height: 1.6;
        }

        .status-dot{
          width:10px;
          height:10px;
          border-radius:999px;
          background: var(--success);
          box-shadow: 0 0 0 6px rgba(34,197,94,.12);
          flex: 0 0 auto;
        }

        .link-panel{
          border: 1px solid var(--line);
          border-radius: var(--radius-md);
          background: rgba(2,6,23,.3);
          padding: 14px;
        }

        .link-title{
          color: var(--muted);
          font-size: 12px;
          text-transform: uppercase;
          letter-spacing: .05em;
          margin-bottom: 10px;
        }

        .link-box{
          font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
          font-size: 13px;
          line-height: 1.7;
          word-break: break-all;
          color: #dbeafe;
          min-height: 52px;
        }

        .grid{
          display:grid;
          grid-template-columns: 1fr 1fr 1fr;
          gap: 14px;
        }

        .group{
          border: 1px solid var(--line);
          border-radius: var(--radius-md);
          background: rgba(255,255,255,.02);
          padding: 14px;
        }

        .group h3{
          margin:0 0 10px;
          font-size: 13px;
          color: var(--muted);
          text-transform: uppercase;
          letter-spacing: .05em;
        }

        .button-list{
          display:flex;
          flex-wrap:wrap;
          gap: 10px;
        }

        .tool-btn{
          appearance:none;
          text-decoration:none;
          color: var(--text);
          border:1px solid var(--line);
          background: rgba(15,23,42,.75);
          border-radius: 12px;
          padding: 10px 12px;
          font-size: 13px;
          line-height:1;
          transition: .18s ease;
          display:inline-flex;
          align-items:center;
          gap:8px;
        }

        .tool-btn:hover{
          transform: translateY(-1px);
          border-color: rgba(59,130,246,.35);
          background: rgba(30,41,59,.95);
        }

        .footer{
          margin-top: 18px;
          padding: 18px 6px 0;
          display:flex;
          align-items:center;
          justify-content:space-between;
          gap:12px;
          flex-wrap:wrap;
          color: var(--muted);
          font-size: 13px;
        }

        .footer a{
          color: #bfdbfe;
          text-decoration:none;
        }

        .footer a:hover{
          text-decoration:underline;
        }

        .toast{
          position: fixed;
          right: 18px;
          bottom: 18px;
          background: rgba(15,23,42,.96);
          color: #e2e8f0;
          border:1px solid var(--line);
          border-radius: 14px;
          padding: 12px 14px;
          box-shadow: var(--shadow);
          opacity: 0;
          transform: translateY(10px);
          pointer-events:none;
          transition: .2s ease;
          z-index: 20;
          font-size: 13px;
        }

        .toast.show{
          opacity: 1;
          transform: translateY(0);
        }

        @media (max-width: 980px){
          .hero-main{
            grid-template-columns: 1fr;
          }
          .qr-card{
            min-height: auto;
          }
          .grid{
            grid-template-columns: 1fr;
          }
        }

        @media (max-width: 640px){
          .wrap{ padding: 16px 14px 28px; }
          .topbar{ align-items:flex-start; flex-direction:column; }
          .top-actions{ width:100%; justify-content:flex-start; }
          .hero-top{
            flex-direction:column;
            align-items:flex-start;
          }
          .hero-status{
            text-align:left;
          }
          .qr-box{
            width: 100%;
            max-width: 292px;
            height: auto;
            aspect-ratio: 1/1;
          }
        }
      </style>
    </head>
    <body>
      <div class="wrap">
        <div class="topbar">
          <div class="brand">
            <div class="brand-icon">🚀</div>
            <div class="brand-text">
              <h1 class="title">Uncle LUO Kyma Automation Platform</h1>
              <p class="subtitle">Self-Hosted Automation Engine for SAP Kyma</p>
            </div>
          </div>

          <div class="top-actions">
            <span class="pill">v163</span>
            <a class="pill youtube" href="https://www.youtube.com/@UncleLUO" target="_blank" rel="noopener noreferrer">
              ▶ YouTube
            </a>
          </div>
        </div>

        <section class="hero">
          <div class="hero-top">
            <div>
              <span class="hero-badge">Automation Platform</span>
            </div>
            <div class="hero-status">
              Generated from <strong>link.txt</strong><br />
              Runtime connection panel
            </div>
          </div>

          <div class="hero-main">
            <div class="qr-card">
              <div class="qr-label">Connection QR Code</div>
              <div class="qr-box">
                <img id="qr" alt="QR Code" style="display:none;" />
                <div id="qrPlaceholder" class="qr-placeholder">
                  正在初始化连接信息...
                </div>
              </div>
              <button id="copyBtn" class="copy-btn">🔗 Copy Link</button>
            </div>

            <div class="info-card">
              <div class="section-head">
                <div>
                  <h2 class="section-title">VLESS Connection Link</h2>
                  <p class="section-desc">
                    自动读取部署后的运行时连接信息，并生成二维码展示。
                  </p>
                </div>
                <div class="status-dot" title="Ready indicator"></div>
              </div>

              <div class="link-panel">
                <div class="link-title">Current Link</div>
                <div id="linkBox" class="link-box">(loading...)</div>
              </div>

              <div class="grid">
                <div class="group">
                  <h3>Runtime</h3>
                  <div class="button-list">
                    <a class="tool-btn" href="link.txt" target="_blank" rel="noopener">link.txt</a>
                    <a class="tool-btn" href="uuid.txt" target="_blank" rel="noopener">uuid.txt</a>
                    <a class="tool-btn" href="instance_id.txt" target="_blank" rel="noopener">instance_id</a>
                  </div>
                </div>

                <div class="group">
                  <h3>Deployment</h3>
                  <div class="button-list">
                    <a class="tool-btn" href="cluster.txt" target="_blank" rel="noopener">cluster</a>
                    <a class="tool-btn" href="deploy_domain.txt" target="_blank" rel="noopener">deploy_domain</a>
                    <a class="tool-btn" href="max_instances.txt" target="_blank" rel="noopener">max_instances</a>
                  </div>
                </div>

                <div class="group">
                  <h3>System</h3>
                  <div class="button-list">
                    <a class="tool-btn" href="healthz" target="_blank" rel="noopener">healthz</a>
                    <a class="tool-btn" href="copyright.txt" target="_blank" rel="noopener">copyright</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <div class="footer">
          <div>© Uncle LUO Automation Platform</div>
          <div>
            Learn more on YouTube →
            <a href="https://www.youtube.com/@UncleLUO" target="_blank" rel="noopener noreferrer">@UncleLUO</a>
          </div>
        </div>
      </div>

      <div id="toast" class="toast">Link copied</div>

      <script>
        (function () {
          const qr = document.getElementById('qr');
          const qrPlaceholder = document.getElementById('qrPlaceholder');
          const linkBox = document.getElementById('linkBox');
          const copyBtn = document.getElementById('copyBtn');
          const toast = document.getElementById('toast');

          let currentLink = '';

          function showToast(text) {
            toast.textContent = text;
            toast.classList.add('show');
            clearTimeout(showToast._timer);
            showToast._timer = setTimeout(() => {
              toast.classList.remove('show');
            }, 1800);
          }

          function render(link) {
            currentLink = link;
            linkBox.textContent = link;

            const qrUrl =
              'https://api.qrserver.com/v1/create-qr-code/?size=260x260&margin=14&ecc=Q&data=' +
              encodeURIComponent(link);

            qr.src = qrUrl;
            qr.onload = function () {
              qr.style.display = 'block';
              qrPlaceholder.style.display = 'none';
            };
          }

          async function copyLink() {
            if (!currentLink) {
              showToast('Link is not ready yet');
              return;
            }
            try {
              await navigator.clipboard.writeText(currentLink);
              showToast('Link copied');
            } catch (e) {
              showToast('Copy failed');
            }
          }

          copyBtn.addEventListener('click', copyLink);

          fetch('link.txt', { cache: 'no-store' })
            .then(r => r.ok ? r.text() : Promise.reject(new Error('not ready')))
            .then(t => t.trim())
            .then(link => {
              if (!link) throw new Error('empty');
              render(link);
            })
            .catch(() => {
              linkBox.textContent = '(link.txt 还没生成：ELB 或运行时仍在初始化，8 秒后自动刷新...)';
              qrPlaceholder.textContent = '连接信息尚未就绪，系统将在 8 秒后自动刷新。';
              setTimeout(() => location.reload(), 8000);
            });
        })();
      </script>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uncleluo-vless-v163
  namespace: uncleluo
  labels:
    app: uncleluo-vless-v163
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uncleluo-vless-v163
  template:
    metadata:
      labels:
        app: uncleluo-vless-v163
    spec:
      serviceAccountName: uncleluo-vless-sa-v163
      automountServiceAccountToken: true

      volumes:
        - name: work
          emptyDir: {}
        - name: cm-web
          configMap:
            name: uncleluo-web-files-v163

      initContainers:
        - name: uncleluo-sap-core-init
          image: ghcr.io/uncleluogithub/uncleluo-sap-kyma-automation:v163-ultimate
          imagePullPolicy: Always
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SVC_NAME
              value: uncleluo-vless-v163-svc
            - name: WORKDIR
              value: /work
            - name: LICENSE_ENDPOINT
              value: "https://uncleluo-license-worker-v163.uncleluo2030.workers.dev"
            - name: RELEASE_ID
              value: "UL-V163-SAP"
            - name: EDITION
              value: "ultimate"
            - name: CHANNEL
              value: "youtube"
            - name: CLUSTER_ID
              value: "UNCLELUO-KYMA-001"
            - name: DEPLOY_DOMAIN
              value: "kyma.ondemand.com"
            - name: LICENSE_SIGNING_KEY
              value: "ULO-V163-2026-LICENSE-SIGNING-KEY-VERY-SECRET-001"
            - name: REQUEST_SIGNING_KEY
              value: "ULO-V163-2026-REQUEST-SIGNING-KEY-VERY-SECRET-002"
            - name: VLESS_PORT
              value: "9090"
            - name: WS_PATH
              value: "/UncleLUO"
            - name: ENC_PATH
              value: "%2FUncleLUO"
            - name: HOST_HDR
              value: "www.sap.com"
          volumeMounts:
            - name: work
              mountPath: /work

      containers:
        - name: vless-core
          image: ghcr.io/sagernet/sing-box:v1.9.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              protocol: TCP
          args: ["run","-c","/etc/sing-box/config.json"]
          volumeMounts:
            - name: work
              mountPath: /etc/sing-box
              subPath: sb

        - name: web
          image: ghcr.io/nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: NGINX_ENTRYPOINT_QUIET_LOGS
              value: "1"
          volumeMounts:
            - name: work
              mountPath: /usr/share/nginx/html
              subPath: web
            - name: cm-web
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true

        - name: print-entry
          image: quay.io/jitesoft/alpine:3.20
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh","-c"]
          args:
            - |
              set -eu
              while true; do
                ELB="$(cat /work/elb.txt 2>/dev/null || echo ELB_PENDING)"
                UUID="$(cat /work/web/uuid.txt 2>/dev/null || echo UUID_PENDING)"
                INSTANCE_ID="$(cat /work/web/instance_id.txt 2>/dev/null || echo INSTANCE_PENDING)"
                DEPLOY_DOMAIN="$(cat /work/web/deploy_domain.txt 2>/dev/null || echo DOMAIN_PENDING)"
                echo "============= Uncle LUO SAP Kyma Automation v163 ============="
                echo "Web:           http://${ELB}/"
                echo "UUID:          ${UUID}"
                echo "InstanceID:    ${INSTANCE_ID}"
                echo "DeployDomain:  ${DEPLOY_DOMAIN}"
                echo "Healthz:       http://${ELB}/healthz"
                echo "Cluster:       http://${ELB}/cluster.txt"
                echo "Domain:        http://${ELB}/deploy_domain.txt"
                echo "MaxInstances:  http://${ELB}/max_instances.txt"
                echo "Link:          http://${ELB}/link.txt"
                echo "Copyright:     http://${ELB}/copyright.txt"
                echo "=============================================================="
                sleep 3600
              done
          volumeMounts:
            - name: work
              mountPath: /work
---
apiVersion: v1
kind: Service
metadata:
  name: uncleluo-vless-v163-svc
  namespace: uncleluo
  labels:
    app: uncleluo-vless-v163
spec:
  type: LoadBalancer
  selector:
    app: uncleluo-vless-v163
  ports:
    - name: vless-ws
      port: 9090
      targetPort: 9090
      protocol: TCP
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
