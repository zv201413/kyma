apiVersion: apps/v1
kind: Deployment
metadata:
  name: zvps-super
  namespace: zvps-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zvps-super
  template:
    metadata:
      labels:
        app: zvps-super
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: ubuntu-node
          image: ghcr.io/zv201413/zvps:latest 
          imagePullPolicy: Always
          env:
            - name: TTYD
              value: "admin:yourpassword123"
            - name: SSH_USER
              value: "你的用户名"
            - name: SSH_PWD
              value: "你的自定义密码"
            - name: GB
              value: "true"
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
          volumeMounts:
            - name: data-storage
              mountPath: /home/zv
      volumes:
        - name: data-storage
          persistentVolumeClaim:
            claimName: zvps-pvc

---
# 2. Service TCP: 处理 SSH 和 Web (使用标准 ELB)
apiVersion: v1
kind: Service
metadata:
  name: zvps-svc-tcp
  namespace: zvps-system
spec:
  type: LoadBalancer
  selector:
    app: zvps-super
  ports:
    - name: ssh-port
      protocol: TCP
      port: 22
      targetPort: 22
    - name: ttyd-port
      protocol: TCP
      port: 80
      targetPort: 7681

---
# 3. Service UDP: 处理 Hysteria 2 和 TUIC (必须使用 NLB)
apiVersion: v1
kind: Service
metadata:
  name: zvps-svc-udp
  namespace: zvps-system
  annotations:
    # [修改点] 必须添加此注解，否则 AWS 无法创建支持 UDP 的负载均衡器
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: zvps-super
  ports:
    - name: hy-udp
      protocol: UDP
      port: 2325
      targetPort: 2325
    - name: tuic-udp
      protocol: UDP
      port: 2326
      targetPort: 2326
  externalTrafficPolicy: Cluster

---
# 4. NetworkPolicy: 开放 UDP 端口入站安全规则
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-ingress
  namespace: zvps-system
spec:
  podSelector:
    matchLabels:
      app: zvps-super
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: UDP
          port: 2325
        - protocol: UDP
          port: 2326
