apiVersion: v1
spec:
  accessModes:
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zvps-super
  namespace: zvps-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zvps-super
  template:
    metadata:
      labels:
        app: zvps-super
    spec:
      # 如果你的镜像在 GHCR 是私有的，请取消下面两行的注释并创建对应的 Secret
      # imagePullSecrets:
      #   - name: ghcr-secret
      securityContext:
        fsGroup: 1000  # 确保挂载的存储卷，用户 zv (uid 1000) 有权读写
      containers:
        - name: ubuntu-node
          image: ghcr.io/zv201413/zvps:latest  # 确认这是你在 GHCR 上的镜像路径
          imagePullPolicy: Always
          env:
            - name: SSH_USER
              value: "zv"
            - name: SSH_PWD
              value: "你的自定义密码"
            - name: GB
              value: "true"
            - name: CF_TOKEN
              value: "" # 如果你有 Cloudflare Tunnel Token 可以填在这里
          ports:
            - containerPort: 22
              name: ssh
            - containerPort: 7681
              name: ttyd
          volumeMounts:
            - name: data-storage
              mountPath: /home/zv  # 将永久存储挂载到你的家目录
          securityContext:
            runAsUser: 0  # 必须以 root 启动以运行 entrypoint.sh 里的初始化逻辑
            privileged: false
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: data-storage
          persistentVolumeClaim:
            claimName: zvps-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: zvps-svc
  namespace: zvps-system
spec:
  type: LoadBalancer  # 自动申请公网 IP
  selector:
    app: zvps-super
  ports:
    - name: ssh-port
      protocol: TCP
      port: 22
      targetPort: 22
    - name: ttyd-port
      protocol: TCP
      port: 80       # 外部通过 80 端口访问网页终端
      targetPort: 7681
